problem:
  instance:
    C: 512
    Hdilation: 1
    Hstride: 1
    M: 10
    N: 1
    P: 1
    Q: 1
    R: 1
    S: 1
    Wdilation: 1
    Wstride: 1

  shape:
    name: CNN-Layer
    dimensions:
    - C
    - M
    - R
    - S
    - N
    - P
    - Q

    coefficients:
    - name: Wstride
      default: 1
    - name: Hstride
      default: 1
    - name: Wdilation
      default: 1
    - name: Hdilation
      default: 1

    data-spaces:

    - name: Weights
      projection:
      - - - C
      - - - M
      - - - R
      - - - S

    - name: Inputs
      projection:
      - - - N
      - - - C
      - - - R
          - Wdilation
        - - P
          - Wstride
      - - - S
          - Hdilation
        - - Q
          - Hstride

    - name: Outputs
      projection:
      - - - N
      - - - M
      - - - Q
      - - - P
      read-write: true