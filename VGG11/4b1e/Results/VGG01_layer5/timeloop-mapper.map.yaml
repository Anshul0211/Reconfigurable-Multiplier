mapping:
  - target: Registers
    type: datatype
    keep:
      - Weights
    bypass:
      - Inputs
      - Outputs
  - target: Input_Buffer
    type: datatype
    keep:
      - Inputs
    bypass:
      - Weights
      - Outputs
  - target: Accumulator
    type: datatype
    keep:
      - Outputs
    bypass:
      - Weights
      - Inputs
  - target: Scratchpad
    type: datatype
    keep:
      - Weights
      - Inputs
    bypass:
      - Outputs
  - target: DRAM
    type: datatype
    keep:
      - Weights
      - Inputs
      - Outputs
    bypass:
      []
  - target: Registers
    type: temporal
    factors: C1 M1 R1 S1 N1 P1 Q1
    permutation: CMRSNPQ
  - target: Input_Buffer
    type: spatial
    factors: C4 M4 R1 S1 N1 P1 Q1
    permutation: CMRSNPQ
    split: 2
  - target: Input_Buffer
    type: temporal
    factors: C1 M2 R3 S1 N1 P1 Q14
    permutation: QMRCSNP
  - target: Accumulator
    type: temporal
    factors: C4 M1 R1 S1 N1 P2 Q1
    permutation: PCMRSNQ
  - target: Scratchpad
    type: spatial
    factors: C2 M4 R1 S1 N1 P2 Q1
    permutation: CMPRSNQ
    split: 3
  - target: Scratchpad
    type: temporal
    factors: C2 M1 R1 S3 N1 P1 Q1
    permutation: SCMRNPQ
  - target: DRAM
    type: temporal
    factors: C4 M16 R1 S1 N1 P7 Q2
    permutation: PCQMRSN