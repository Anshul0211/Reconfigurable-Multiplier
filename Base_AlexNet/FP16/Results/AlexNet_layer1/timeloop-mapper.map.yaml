mapping:
  - target: Registers
    type: datatype
    keep:
      - Weights
    bypass:
      - Inputs
      - Outputs
  - target: Input_Buffer
    type: datatype
    keep:
      - Inputs
    bypass:
      - Weights
      - Outputs
  - target: Accumulator
    type: datatype
    keep:
      - Outputs
    bypass:
      - Weights
      - Inputs
  - target: Scratchpad
    type: datatype
    keep:
      - Weights
      - Inputs
    bypass:
      - Outputs
  - target: DRAM
    type: datatype
    keep:
      - Weights
      - Inputs
      - Outputs
    bypass:
      []
  - target: Registers
    type: temporal
    factors: C1 M1 R1 S1 N1 P1 Q1
    permutation: CMRSNPQ
  - target: Input_Buffer
    type: spatial
    factors: C3 M4 R1 S1 N1 P1 Q1
    permutation: CMRSNPQ
    split: 2
  - target: Input_Buffer
    type: temporal
    factors: C1 M1 R11 S11 N1 P1 Q1
    permutation: SRCMNPQ
  - target: Accumulator
    type: temporal
    factors: C1 M4 R1 S1 N1 P1 Q11
    permutation: MQCRSNP
  - target: Scratchpad
    type: spatial
    factors: C1 M3 R1 S1 N1 P5 Q1
    permutation: MPCRSNQ
    split: 2
  - target: Scratchpad
    type: temporal
    factors: C1 M2 R1 S1 N1 P1 Q5
    permutation: QMCRSNP
  - target: DRAM
    type: temporal
    factors: C1 M1 R1 S1 N1 P11 Q1
    permutation: PCMRSNQ