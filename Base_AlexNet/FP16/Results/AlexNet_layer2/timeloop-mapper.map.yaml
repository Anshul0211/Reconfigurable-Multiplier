mapping:
  - target: Registers
    type: datatype
    keep:
      - Weights
    bypass:
      - Inputs
      - Outputs
  - target: Input_Buffer
    type: datatype
    keep:
      - Inputs
    bypass:
      - Weights
      - Outputs
  - target: Accumulator
    type: datatype
    keep:
      - Outputs
    bypass:
      - Weights
      - Inputs
  - target: Scratchpad
    type: datatype
    keep:
      - Weights
      - Inputs
    bypass:
      - Outputs
  - target: DRAM
    type: datatype
    keep:
      - Weights
      - Inputs
      - Outputs
    bypass:
      []
  - target: Registers
    type: temporal
    factors: C1 M1 R1 S1 N1 P1 Q3
    permutation: QCMRSNP
  - target: Input_Buffer
    type: spatial
    factors: C8 M2 R1 S1 N1 P1 Q1
    permutation: CMRSNPQ
    split: 2
  - target: Input_Buffer
    type: temporal
    factors: C3 M1 R5 S1 N1 P1 Q1
    permutation: RCMSNPQ
  - target: Accumulator
    type: temporal
    factors: C1 M2 R1 S1 N1 P3 Q3
    permutation: PMQCRSN
  - target: Scratchpad
    type: spatial
    factors: C1 M16 R1 S1 N1 P1 Q1
    permutation: MCRSNPQ
    split: 1
  - target: Scratchpad
    type: temporal
    factors: C2 M2 R1 S1 N1 P9 Q1
    permutation: CMPRSNQ
  - target: DRAM
    type: temporal
    factors: C2 M2 R1 S5 N1 P1 Q3
    permutation: SMQCRNP